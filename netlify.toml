# HueSky Oy - Netlify-asetukset
# Staattinen sivusto: ei build-komentoa, julkaisukansio on repon juuri.

[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
# CSS:lle ei pitkää cachea: tiedostonimi ei muutu päivitysten yhteydessä,
# joten Netlifyn oletus (ETag-pohjainen validointi) on oikea ratkaisu.
